name: Build Project

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to validate. Leave empty to read it from pom.xml.'
        required: false
        default: ''
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags-ignore:
      - '*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v5

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        uses: ./.github/actions/build-project
        with:
          version: ${{ inputs.version || '' }}
