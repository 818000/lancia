name: Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish. Leave empty to read it from pom.xml.'
        required: false
        default: ''
        type: string
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
      is-prerelease: ${{ steps.build.outputs.is-prerelease }}
    steps:
      - name: Check Out Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Requested Version
        id: request
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            version="${REF_NAME#v}"
          else
            version="${INPUT_VERSION#v}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        id: build
        uses: ./.github/actions/build-project
        with:
          version: ${{ steps.request.outputs.version }}

      - name: Validate Release Version
        env:
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          set -euo pipefail

          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "::error::SNAPSHOT versions cannot be published to Maven Central: $VERSION"
            exit 1
          fi

  publish:
    name: Publish to Maven Central
    needs: build
    if: ${{ github.repository == '839128/lancia' }}
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://central.sonatype.com/publishing/deployments
    env:
      MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
      MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Check Out Code
        uses: actions/checkout@v5

      - name: Set Up Java and Maven Central Credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_TOKEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish Project
        uses: ./.github/actions/maven-central
        with:
          version: ${{ needs.build.outputs.version }}
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  github-release:
    name: Create GitHub Release
    needs: [build, publish]
    if: ${{ github.ref_type == 'tag' && needs.publish.result == 'success' }}
    permissions:
      contents: write
    uses: ./.github/workflows/create-release.yml
    with:
      tag: ${{ github.ref_name }}
      version: ${{ needs.build.outputs.version }}
      prerelease: ${{ needs.build.outputs.is-prerelease == 'true' }}
    secrets: inherit
