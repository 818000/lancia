name: Maven Central
description: 'Publishes Bus modules to Maven Central'

inputs:
  modules:
    description: 'Whitespace-separated module list in deployment order.'
    required: true
  maven-args:
    description: 'Additional Maven arguments.'
    required: false
    default: '-B -ntp -DskipTests -Djava.version=21 -Dmaven.compiler.release=21'
  goals:
    description: 'Maven goals to execute for modules that publish themselves.'
    required: false
    default: 'clean deploy'

runs:
  using: composite
  steps:
    - name: Verify Maven Central Credentials
      shell: bash
      run: |
        set -euo pipefail

        : "${MAVEN_CENTRAL_TOKEN_USERNAME:?Missing MAVEN_CENTRAL_TOKEN_USERNAME secret}"
        : "${MAVEN_CENTRAL_TOKEN_PASSWORD:?Missing MAVEN_CENTRAL_TOKEN_PASSWORD secret}"
        : "${MAVEN_GPG_PASSPHRASE:?Missing MAVEN_GPG_PASSPHRASE secret}"

        if ! command -v gpg >/dev/null 2>&1; then
          echo "::error::gpg command is not available"
          exit 1
        fi

        gpg --batch --list-secret-keys --keyid-format LONG

    - name: Deploy Modules
      shell: bash
      env:
        MODULES: ${{ inputs.modules }}
        MAVEN_ARGS: ${{ inputs.maven-args }}
        GOALS: ${{ inputs.goals }}
      run: |
        set -euo pipefail

        SOURCE_PARENT_INSTALLED=false

        requires_source_parent() {
          awk '
            /<parent>/ { in_parent = 1 }
            /<\/parent>/ { in_parent = 0 }
            in_parent && /<artifactId>bus-parent<\/artifactId>/ { found = 1 }
            END { exit(found ? 0 : 1) }
          ' "$1"
        }

        for module in $MODULES; do
          case "$module" in
            bus-*) ;;
            *)
              echo "::error::Non-Bus module '$module' is not supported by the Bus Maven Central action"
              exit 1
              ;;
          esac

          if [ "$SOURCE_PARENT_INSTALLED" = false ] && requires_source_parent "$module/pom.xml"; then
            echo "::group::Install source bus-parent for module publishing"
            mvn $MAVEN_ARGS -Dgpg.skip=true -Dgroom.skip=true -f bus-parent/pom.xml clean install
            echo "::endgroup::"
            SOURCE_PARENT_INSTALLED=true
          fi

          echo "::group::Deploy $module"
          case "$module" in
            bus-parent)
              mvn $MAVEN_ARGS -Dgroom.updatePomFile=true -Dgroom.pomElements.buildPlugins=remove -f "$module/pom.xml" $GOALS
              echo "::endgroup::"
              echo "::group::Install source bus-parent for module publishing"
              mvn $MAVEN_ARGS -Dgpg.skip=true -Dgroom.skip=true -f bus-parent/pom.xml clean install
              echo "::endgroup::"
              SOURCE_PARENT_INSTALLED=true
              continue
              ;;
            *)
              mvn $MAVEN_ARGS -Dgroom.updatePomFile=true -DautoPublish=true -DpublishingServerId=central -f "$module/pom.xml" \
                clean install org.apache.maven.plugins:maven-gpg-plugin:sign \
                org.sonatype.central:central-publishing-maven-plugin:publish
              ;;
          esac
          echo "::endgroup::"
        done
