name: Build Project
description: 'Builds and validates the Lancia Maven project.'

inputs:
  version:
    description: 'Version to validate. Leave empty to read it from pom.xml.'
    required: false
    default: ''
  maven-args:
    description: 'Additional Maven arguments.'
    required: false
    default: '-B -ntp -DskipTests -Djava.version=21 -Dmaven.compiler.release=21'
  goals:
    description: 'Maven goals to execute.'
    required: false
    default: 'clean verify'
  gpg-skip:
    description: 'Whether to skip GPG signing during build.'
    required: false
    default: 'true'

outputs:
  version:
    description: 'Resolved project version.'
    value: ${{ steps.metadata.outputs.version }}
  is-prerelease:
    description: 'Whether the resolved version is a pre-release.'
    value: ${{ steps.metadata.outputs.is-prerelease }}

runs:
  using: composite
  steps:
    - name: Print Logo
      shell: bash
      run: |
        set -euo pipefail

        if [ -x ".github/scripts/logo.sh" ]; then
          .github/scripts/logo.sh
        fi

    - name: Resolve Project Version
      id: metadata
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ ! -f pom.xml ]; then
          echo "::error file=pom.xml::Project POM is required"
          exit 1
        fi

        pom_version="$(awk -F'[<>]' '
          /<parent>/ { in_parent = 1 }
          /<\/parent>/ { in_parent = 0; next }
          !in_parent && /<version>/ { print $3; exit }
        ' pom.xml)"

        if [ -z "$pom_version" ] || [[ "$pom_version" == *'${'* ]]; then
          pom_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
        fi

        version="${INPUT_VERSION#v}"
        if [ -z "$version" ]; then
          version="$pom_version"
        fi

        if [ -z "$version" ]; then
          echo "::error::Unable to resolve project version"
          exit 1
        fi

        if [ "$pom_version" != "$version" ]; then
          echo "::error file=pom.xml::POM version '$pom_version' does not match requested version '$version'"
          exit 1
        fi

        if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
          echo "::error::Invalid project version: $version"
          exit 1
        fi

        if [[ "$version" == *-* ]]; then
          is_prerelease=true
        else
          is_prerelease=false
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "is-prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

    - name: Build Project
      shell: bash
      env:
        MAVEN_ARGS: ${{ inputs.maven-args }}
        GOALS: ${{ inputs.goals }}
        GPG_SKIP: ${{ inputs.gpg-skip }}
      run: |
        set -euo pipefail

        if [ "$GPG_SKIP" = "true" ]; then
          mvn $MAVEN_ARGS -Dgpg.skip=true $GOALS
        else
          mvn $MAVEN_ARGS $GOALS
        fi
